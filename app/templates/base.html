<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Powens Finance{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    if (localStorage.getItem("pf-hide") === "1") {
      document.documentElement.classList.add("hide-amounts");
    }
  </script>
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="logo">💰</span> Powens&nbsp;Finance</span>
    <nav class="tabs">
      <a href="/" class="{{ 'on' if active == 'recap' }}">Récap</a>
      <a href="/recurrences" class="{{ 'on' if active == 'frequency' }}">Récurrences</a>
      <a href="/abonnements" class="{{ 'on' if active == 'recurring' }}">Abonnements</a>
      <a href="/analyse" class="{{ 'on' if active == 'analysis' }}">Analyse</a>
    </nav>
    <span class="spacer"></span>
    <button id="mask-toggle" class="btn btn-sm" title="Masquer / afficher les montants">👁 Montants</button>
    <a class="btn btn-primary btn-sm" href="/connect">+ Banque</a>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">Données via Powens · usage personnel</footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
