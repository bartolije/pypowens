<!doctype html>
<html lang="fr" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Powens Finance{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Apply saved theme before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("pf-theme") || "corporate";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="navbar bg-base-100 shadow-sm sticky top-0 z-30 px-3 md:px-6 gap-2">
    <div class="flex-1 items-center gap-3">
      <span class="text-lg font-bold">💰 Powens&nbsp;Finance</span>
      <div role="tablist" class="tabs tabs-boxed bg-base-200 hidden sm:flex">
        <a role="tab" href="/" class="tab {{ 'tab-active' if active == 'recap' }}">Récap</a>
        <a role="tab" href="/recurrences" class="tab {{ 'tab-active' if active == 'frequency' }}">Récurrences</a>
        <a role="tab" href="/abonnements" class="tab {{ 'tab-active' if active == 'recurring' }}">Abonnements</a>
        <a role="tab" href="/analyse" class="tab {{ 'tab-active' if active == 'analysis' }}">Analyse</a>
      </div>
    </div>
    <div class="flex-none gap-2">
      <button id="theme-toggle" class="btn btn-ghost btn-sm btn-circle" title="Thème clair/sombre" aria-label="Basculer le thème">
        <span class="theme-light">🌙</span><span class="theme-dark">☀️</span>
      </button>
      <a class="btn btn-primary btn-sm" href="/connect">+ Banque</a>
    </div>
  </div>

  <!-- mobile tabs -->
  <div role="tablist" class="tabs tabs-boxed m-2 sm:hidden">
    <a role="tab" href="/" class="tab {{ 'tab-active' if active == 'recap' }}">Récap</a>
    <a role="tab" href="/recurrences" class="tab {{ 'tab-active' if active == 'frequency' }}">Récurr.</a>
    <a role="tab" href="/abonnements" class="tab {{ 'tab-active' if active == 'recurring' }}">Abos</a>
    <a role="tab" href="/analyse" class="tab {{ 'tab-active' if active == 'analysis' }}">Analyse</a>
  </div>

  <main class="max-w-5xl mx-auto p-3 md:p-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer footer-center p-4 text-base-content/50 text-xs">
    <span>Données via Powens · usage personnel</span>
  </footer>

  <script src="/static/app.js" defer></script>
</body>
</html>
